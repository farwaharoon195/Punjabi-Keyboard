const PREFIX_MAP = {};
SENTENCES.forEach(s => {
  for(let i=1;i<=Math.min(4,s.length);i++){
    const k=s.slice(0,i);
    if(!PREFIX_MAP[k]) PREFIX_MAP[k]=[];
    if(PREFIX_MAP[k].length<8) PREFIX_MAP[k].push(s);
  }
  const firstWord = s.split(' ')[0];
  if(!PREFIX_MAP[firstWord]) PREFIX_MAP[firstWord]=[];
  if(PREFIX_MAP[firstWord].length<8) PREFIX_MAP[firstWord].push(s);
});

let currentLang='punjabi', typedText='', composing='', darkMode=false;

function getLangLabel(){
  return {punjabi:'پنجابی شاہمکھی',urdu:'اردو',english:'English',auto:'Auto'}[currentLang];
}

function setLang(l){
  currentLang=l; composing='';
  document.querySelectorAll('.lang-pill').forEach(b=>b.classList.remove('active'));
  const lmap={punjabi:'پنجابی',urdu:'اردو',english:'EN',auto:'Auto'};
  document.querySelectorAll('.lang-pill').forEach(b=>{if(b.textContent===lmap[l])b.classList.add('active');});
  document.getElementById('mlabel').textContent=getLangLabel();
  buildKeyboard(); updateDisplay(); predict('');
}

function toggleDark(){
  darkMode=!darkMode;
  document.getElementById('keyboard').classList.toggle('dk',darkMode);
  document.querySelectorAll('.key').forEach(k=>k.classList.toggle('dk',darkMode));
  document.getElementById('tbtn').textContent=darkMode?'☀️':'🌙';
}

function buildKeyboard(){
  const kb=document.getElementById('keyboard'); kb.innerHTML='';
  const layout=LAYOUTS[currentLang==='auto'?'punjabi':currentLang];
  layout.forEach(row=>{
    const rDiv=document.createElement('div'); rDiv.className='kb-row';
    row.forEach(kd=>{
      const btn=document.createElement('div');
      btn.className='key'+(kd.eng?' eng':'')+(darkMode?' dk':'');
      btn.innerHTML=`<span class="pc">${kd.p}</span>`;
      if(kd.s) btn.innerHTML+=`<span class="sc">${kd.s}</span>`;
      if(kd.a&&kd.a.length) btn.innerHTML+=`<div class="ad"></div>`;
      btn.addEventListener('pointerdown',()=>{pressKey(kd.p);btn.classList.add('pressed');setTimeout(()=>btn.classList.remove('pressed'),140);});
      rDiv.appendChild(btn);
    });
    kb.appendChild(rDiv);
  });
  const ar=document.createElement('div'); ar.className='kb-row';
  const mk=(cls,label,fn)=>{
    const b=document.createElement('div');
    b.className='key '+cls+(darkMode?' dk':'');
    b.innerHTML=`<span class="pc" style="font-size:14px;font-family:var(--font-sans)">${label}</span>`;
    b.addEventListener('pointerdown',fn); ar.appendChild(b);
  };
  mk('spl','🌐',()=>{ const ls=['punjabi','urdu','english','auto']; setLang(ls[(ls.indexOf(currentLang)+1)%ls.length]); });
  const spBtn=document.createElement('div');
  spBtn.className='key sp'+(darkMode?' dk':'');
  spBtn.innerHTML=`<span>${getLangLabel()}</span>`;
  spBtn.addEventListener('pointerdown',pressSpace); ar.appendChild(spBtn);
  mk('spl','⌫',pressDelete);
  const entBtn=document.createElement('div');
  entBtn.className='key ent'; entBtn.innerHTML='<span style="font-size:15px">↵</span>';
  entBtn.addEventListener('pointerdown',pressEnter); ar.appendChild(entBtn);
  kb.appendChild(ar);
}

function pressKey(ch){
  composing+=ch; updateDisplay(); predict(composing);
}
function pressSpace(){
  if(composing){typedText+=composing+' ';composing='';}
  else typedText+=' ';
  updateDisplay();
  const lastWord=typedText.trim().split(/\s+/).pop()||'';
  const nw=BIGRAMS[lastWord]||getTopWords(5);
  showCandidates(nw.slice(0,5),'next');
  updateHint('اگلا لفظ چنو یا ٹائپ کرتے رہو');
}
function pressDelete(){
  if(composing.length){composing=composing.slice(0,-1);updateDisplay();predict(composing);}
  else if(typedText.length){typedText=typedText.slice(0,-1);updateDisplay();}
}
function pressEnter(){
  if(composing)typedText+=composing+'\n';else typedText+='\n';
  composing='';updateDisplay();showCandidates([]);
}
function commitCandidate(text){
  typedText+=text+' '; composing=''; updateDisplay();
  const lastWord=text.trim().split(/\s+/).pop()||'';
  const nw=BIGRAMS[lastWord]||getTopWords(5);
  showCandidates(nw.slice(0,5),'next');
  updateHint('جملہ مکمل ہویا — اگلا لفظ چنو');
}

function predict(comp){
  if(!comp){showCandidates(getTopWords(5),'next');updateHint('ایک حرف ٹائپ کریں — جملے نظر آئیں گے');return;}

  const isRoman=/^[a-zA-Z]+$/.test(comp);
  const results=[];
  const hints=[];

  if((currentLang==='punjabi'||currentLang==='auto')&&isRoman){
    const tKey=comp.toLowerCase();
    // exact transliteration
    if(TRANSLIT[tKey]) results.push(TRANSLIT[tKey]);
    // prefix transliteration
    Object.entries(TRANSLIT).filter(([k])=>k.startsWith(tKey)&&k!==tKey)
      .slice(0,3).forEach(([,v])=>{if(!results.includes(v))results.push(v);});
    // full sentence transliteration matches
    SENTENCES.filter(s=>TRANSLIT[tKey]&&s.startsWith(TRANSLIT[tKey]))
      .slice(0,3).forEach(s=>{if(!hints.includes(s))hints.push(s);});
    updateHint(results.length?`ترجمہ: ${results[0]}`:'Roman ٹائپ کریں → Shahmukhi');
    showCandidates([...results,...hints.map(s=>s.split(' ')[0]).filter(w=>!results.includes(w))].slice(0,5),'translit');
    if(hints.length) showSentenceHints(hints.slice(0,2));
    return;
  }

  // Shahmukhi prefix: sentence-level completions
  const sentMatches=(PREFIX_MAP[comp]||[]).slice(0,5);
  // word-level completions
  const wordMatches=Object.keys(WORD_FREQ).filter(w=>w.startsWith(comp)&&w!==comp)
    .sort((a,b)=>(WORD_FREQ[b]||0)-(WORD_FREQ[a]||0)).slice(0,5);

  const allCandidates=[...new Set([comp,...wordMatches,...sentMatches.map(s=>s.split(' ')[0])])].slice(0,5);
  showCandidates(allCandidates,'prefix');
  if(sentMatches.length){
    showSentenceHints(sentMatches.slice(0,3));
    updateHint(`${sentMatches.length} جملے ملے — نیچے کلک کرو`);
  } else {
    updateHint(wordMatches.length?`${wordMatches.length} الفاظ ملے`:'ٹائپ کرتے رہو...');
  }
}

function showSentenceHints(sentences){
  const hint=document.getElementById('hint-bar');
  hint.innerHTML='';
  sentences.forEach((s,i)=>{
    const d=document.createElement('div');
    d.style.cssText='cursor:pointer;padding:2px 0;color:var(--color-text-secondary);font-size:12px;border-bottom:0.5px solid var(--color-border-tertiary);direction:rtl;';
    d.innerHTML=`<span style="color:#2ECC71;margin-left:4px">${i+1}.</span>${s}`;
    d.addEventListener('pointerdown',()=>commitCandidate(s));
    hint.appendChild(d);
  });
}

function updateHint(msg){
  const h=document.getElementById('hint-bar');
  if(h.children.length>1) return; // don't overwrite sentence hints
  h.style.cssText='padding:6px 14px;font-size:11px;color:var(--color-text-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);direction:rtl;min-height:28px;line-height:1.6;background:var(--color-background-secondary)';
  h.textContent=msg;
}

function showCandidates(preds, type){
  const bar=document.getElementById('candidate-bar');
  bar.innerHTML='<div class="accent-strip"></div>';
  if(!preds||!preds.length){bar.innerHTML+='<div class="candidate-ph">شروع کریں...</div>';return;}
  preds.filter(Boolean).slice(0,6).forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='candidate'+(i===0?' primary':'');
    div.textContent=p;
    div.addEventListener('pointerdown',()=>commitCandidate(p));
    bar.appendChild(div);
    if(i<preds.length-1){const sep=document.createElement('div');sep.style.cssText='width:0.5px;height:22px;background:var(--color-border-tertiary);align-self:center;flex-shrink:0';bar.appendChild(sep);}
  });
}

function getTopWords(n){
  return Object.entries(WORD_FREQ).sort((a,b)=>b[1]-a[1]).slice(0,n).map(e=>e[0]);
}

function updateDisplay(){
  const d=document.getElementById('text-display');
  const isEng=currentLang==='english';
  d.className=isEng?'ltr-mode':'';
  const safe=typedText.replace(/</g,'&lt;').replace(/\n/g,'<br>');
  const comp=composing?`<span class="composing">${composing}</span>`:'';
  d.innerHTML=isEng?`${safe}${comp}<span class="cursor"></span>`
    :`<span class="cursor"></span>${comp}${safe}`;
}

buildKeyboard(); updateDisplay(); predict('');
